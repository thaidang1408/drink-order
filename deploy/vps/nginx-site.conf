# Thay YOUR_DOMAIN bang ten mien that (vd order.example.com)
# Copy: sudo cp deploy/vps/nginx-site.conf /etc/nginx/sites-available/qr-ordering
#       sudo ln -sf /etc/nginx/sites-available/qr-ordering /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name YOUR_DOMAIN;

    client_max_body_size 12M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: qr_ordering
    ports:
      - '${MYSQL_PORT:-3307}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build: .
    restart: unless-stopped
    ports:
      - '${APP_PORT:-8080}:8080'
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8080
      HOST: 0.0.0.0
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-password}@mysql:3306/qr_ordering
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN:-http://localhost:8080}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env for production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      RUN_DB_SEED: ${RUN_DB_SEED:-false}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
